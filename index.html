<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PECHUSOLICITUD 2.0</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- GOOGLE FONT -->
  
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- TU CSS -->
  

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css?v=1">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="card shadow-lg border-0 form-card">
    <div class="card-body p-4 p-md-5 text-center">

      <!-- HEADER -->
      <img src="Images/pechugon-header.png" 
           class="img-fluid mb-4" 
           style="max-height: 120px;" 
           alt="header">

      <!-- ALERTA -->
      <div id="alertaExito" class="alert alert-success alert-dismissible fade show" role="alert" style="display: none;">
        <strong>¡Éxito!</strong> La solicitud fue enviada correctamente.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- TITULO -->
      <h1 class="fw-bold mb-3">
        PECHUSOLICITUD
      </h1>

      <p class="text-muted mb-4 fs-4">
        Selecciona el tipo de solicitud
      </p>

      <!-- TARJETAS -->
      <div class="row g-4 justify-content-center">

        <!-- BOTON -->
        <div class="col-12 col-md-4">
          <div class="card option-card h-100 shadow-sm"
               onclick="location.href='boton.html'">
            <div class="card-body p-4 text-center">
              <i class="bi bi-ui-checks-grid display-5 mb-3"></i>
              <h5 class="fw-bold">Solicitar Botón Nuevo</h5>
              <p class="text-muted mb-4 fs-5">Crear nuevo paquete o botón</p>
            </div>
          </div>
        </div>

        <!-- USUARIO -->
        <div class="col-12 col-md-4">
          <div class="card option-card h-100 shadow-sm"
               onclick="location.href='usuario.html'">
            <div class="card-body p-4 text-center">
              <i class="bi bi-person-badge display-5 mb-3"></i>
              <h5 class="fw-bold">Solicitar Usuario</h5>
              <p class="text-muted mb-4 fs-5">Alta de nuevo usuario</p>
            </div>
          </div>
        </div>

        <!-- SUCURSAL -->
        <div class="col-12 col-md-4">
          <div class="card option-card h-100 shadow-sm"
               onclick="location.href='sucursal.html'">
            <div class="card-body p-4 text-center">
             <i class="bi bi-shop display-5 mb-3"></i>
              <h5 class="fw-bold">Apertura de Sucursal</h5>
              <p class="text-muted mb-4 fs-5">Registrar nueva sucursal</p>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

</div>

<script src="script.js?v=1"></script>
</body>
</html>
