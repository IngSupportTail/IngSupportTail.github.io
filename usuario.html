<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Usuario</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body class="bg-light">

<div class="container py-5">

  <!-- CARD CENTRADA -->
  <div class="card shadow-lg border-0 form-card">

    <div class="card-body p-4 p-md-5">

        <a href="index.html" class="btn btn-outline-secondary btn-back">
  ← Atrás
</a>

      <h2 class="text-center mb-4 fw-bold">
        Solicitud de Usuario
      </h2>

      <p class="text-center text-muted mb-4">
        Completa todos los campos para procesar tu solicitud
      </p>

  <form id="formularioUsuario" action="https://formspree.io/f/mdkordqr" method="POST"></form>

        <div class="row g-3">

          <div class="col-12">
            <label class="form-label">Nombre de quien solicita*</label>
            <input class="form-control form-control-lg" name="solicita" required>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Cargo*</label>
            <input class="form-control form-control-lg" name="Cargo" required>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Teléfono para enviar clave de autorización*</label>
            <input class="form-control form-control-lg" name="numerodetelefono1" required>
            <small class="text-muted">En algunas zonas la clave de autorización cambia de manera automatica y esta se envia via SMS</small>
          </div>

          <div class="col-12">
            <label class="form-label">Zona en donde se dara de alta*</label>
            <input class="form-control form-control-lg" name="Zonalaboral" required>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Nombre de quien se requiere usuario*</label>
            <input class="form-control form-control-lg" name="NombreUsuario" required>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Cargo que desempeñara*</label>
            <input class="form-control form-control-lg" name="CargoPersona" required>
          </div>

          <div class="col-12">
            <label class="form-label">Zona a la que tendrá acceso*</label>
            <input class="form-control form-control-lg" name="ZonaPersona" required>
          </div>

          <div class="col-12">
            <label class="form-label">Correo (opcional)</label>
            <input class="form-control form-control-lg" name="CorreoPersona" type="email">
          </div>

        </div>

        <!-- BOTONES -->
        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">

          <button type="button"
                  class="btn btn-outline-danger px-4"
                  onclick="limpiarFormulario('formularioUsuario')">
            Limpiar
          </button>

          <button type="button"
                  class="btn btn-success px-4"
                  onclick="enviarFormulario1()">
            Enviar solicitud
          </button>

        </div>

      </form>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
